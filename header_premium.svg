0000000000002,519.958488970345 C 204.0,420.158488970345 203.90000000000003,417.05848897034497 202.0,413.258488970345 C 200.90000000000003,411.158488970345 198.7,408.758488970345 197.10000000000002,407.95848897034494 C 194.60000000000002,406.658488970345 181.60000000000002,406.35848897034504 108.9,405.85848897034504 C 23.5,405.258488970345 23.5,405.258488970345 19.60000000000001,407.55848897034497 C 17.0,409.05848897034497 14.700000000000003,411.55848897034497 13.100000000000009,414.85848897034504 C 10.5,419.758488970345 10.5,419.758488970345 10.5,621.4584889703449 C 10.5,823.258488970345 10.5,823.258488970345 12.600000000000009,826.058488970345 C 13.700000000000003,827.558488970345 16.80000000000001,830.358488970345 19.400000000000006,832.058488970345 C 22.0,833.858488970345 25.60000000000001,835.6584889703449 27.30000000000001,836.058488970345 C 29.10000000000001,836.558488970345 79.30000000000001,836.558488970345 139.0,836.258488970345 C 209.2,835.858488970345 250.10000000000002,835.258488970345 255.0,834.558488970345 C 259.1,833.958488970345 272.90000000000003,832.558488970345 285.5,831.358488970345 C 298.20000000000005,830.1584889703449 313.5,828.358488970345 319.5,827.1584889703449 C 325.6,826.058488970345 336.70000000000005,823.6584889703449 344.20000000000005,821.758488970345 C 351.8,819.858488970345 360.1,817.458488970345 362.70000000000005,816.458488970345 C 365.40000000000003,815.458488970345 370.90000000000003,813.858488970345 375.0,812.858488970345 C 379.1,811.858488970345 384.1,810.258488970345 386.0,809.358488970345 C 387.90000000000003,808.358488970345 391.3,807.058488970345 393.5,806.358488970345 C 395.70000000000005,805.6584889703449 406.3,801.358488970345 417.0,796.858488970345 C 427.70000000000005,792.358488970345 437.6,788.258488970345 439.0,787.858488970345 C 440.4,787.4584889703449 444.9,785.1584889703449 449.0,782.858488970345 C 453.1,780.558488970345 461.20000000000005,776.058488970345 467.0,772.858488970345 C 472.80000000000007,772.858488970345 472.80000000000007,772.858488970345 472.80000000000007,772.858488970345" fill="url(#dmGrad)"/>
    </g>
    
    <text x="110" y="47" class="brand-name">DANIEL</text>
    <text x="190" y="47" class="brand-name" fill="#3B82F6">MOLINA</text>

    <!-- Navigation links -->
    <text x="590" y="45" class="nav-link">Método</text>
    <text x="680" y="45" class="nav-link">Servicios</text>
    <text x="780" y="45" class="nav-link">Portafolio</text>
    <text x="880" y="45" class="nav-link">Sobre mí</text>
    <text x="970" y="45" class="nav-link">Contacto</text>

    <!-- Button Hablemos -->
    <rect x="1030" y="22" width="110" height="34" rx="17" fill="url(#btnGrad)"/>
    <text x="1085" y="44" class="btn-text">HABLEMOS</text>
  </g>

  <!-- ==================== HERO CONTENT (LEFT) ==================== -->
  <g transform="translate(60, 150)">
    <!-- Cyan Tagline -->
    <text x="0" y="0" class="tagline">DATA SCIENCE, AUTOMATIZACIÓN E IA APLICADA</text>

    <!-- Giant Title (Replicating exact wrap & style of web landing page) -->
    <text x="0" y="70" class="hero-title">Datos que</text>
    <text x="0" y="140" class="hero-title">generan</text>
    <text x="0" y="210" class="hero-title">claridad.</text>
    <text x="0" y="280" class="hero-title">Sistemas que</text>
    <text x="0" y="350" class="hero-title">impulsan</text>
    <!-- growth styled with beautiful grandient -->
    <text x="0" y="420" class="hero-title" fill="url(#crecimientoGrad)">crecimiento.</text>

    <!-- Paragraph copy under the title -->
    <text x="0" y="465" class="hero-desc">Dashboards, automatizaciones, IA y páginas web que</text>
    <text x="0" y="490" class="hero-desc">convierten información en decisiones estratégicas.</text>
  </g>

  <!-- ==================== DASHBOARD MOCKUP (RIGHT) ==================== -->
  <g transform="translate(680, 140)">
    <!-- Dashboard Card Container -->
    <rect x="0" y="0" width="460" height="460" rx="20" fill="#0C101A" stroke="#1F2937" stroke-width="1.5"/>
    <rect x="1" y="1" width="458" height="458" rx="19" fill="#0F1422" opacity="0.5"/>

    <!-- Browser controls header -->
    <g transform="translate(20, 20)">
      <!-- Browser dots -->
      <circle cx="410" cy="12" r="5" fill="#EF4444"/>
      <circle cx="395" cy="12" r="5" fill="#FBBF24"/>
      <circle cx="380" cy="12" r="5" fill="#10B981"/>

      <!-- Title: Resumen General -->
      <text x="0" y="15" class="dash-title">Resumen general</text>
      
      <!-- Pill Live Insight -->
      <rect x="250" y="1" width="100" height="22" rx="11" fill="#10B981" opacity="0.15"/>
      <rect x="250" y="1" width="100" height="22" rx="11" stroke="#10B981" stroke-width="1" fill="none"/>
      <circle cx="262" cy="12" r="3" fill="#10B981"/>
      <text x="303" y="15" class="dash-pill-text" fill="#10B981">LIVE INSIGHT</text>
    </g>

    <!-- INNER CARD 1: Ingresos -->
    <g transform="translate(20, 60)">
      <!-- Container -->
      <rect x="0" y="0" width="200" height="155" rx="16" fill="#080C14" stroke="#1F2937" stroke-width="1"/>
      
      <!-- Copy -->
      <text x="20" y="32" class="dash-label">INGRESOS</text>
      <text x="20" y="70" class="dash-val">$24,580</text>
      
      <!-- Green Trend Tag -->
      <rect x="20" y="85" width="70" height="20" rx="10" fill="#10B981" opacity="0.15"/>
      <path d="M 30,95 L 34,91 L 38,95" stroke="#10B981" stroke-width="1.5" fill="none"/>
      <text x="45" y="99" class="dash-stat" fill="#10B981">▲ 12.4%</text>

      <!-- Sparkline chart -->
      <path d="M 20,135 Q 50,110 80,130 T 140,115 T 180,125" stroke="#06B6D4" stroke-width="2" fill="none" opacity="0.8"/>
      <circle cx="180" cy="125" r="3" fill="#00F2FE"/>
    </g>

    <!-- INNER CARD 2: Gauges (Usuarios & Conversión) -->
    <g transform="translate(240, 60)">
      <!-- Container -->
      <rect x="0" y="0" width="200" height="155" rx="16" fill="#080C14" stroke="#1F2937" stroke-width="1"/>

      <!-- Gauge 1: 68% Usuarios -->
      <g transform="translate(10, 0)">
        <circle cx="45" cy="65" r="32" stroke="#1F2937" stroke-width="5" fill="none"/>
        <circle cx="45" cy="65" r="32" stroke="#2563EB" stroke-width="5" fill="none" 
                stroke-dasharray="201" stroke-dashoffset="64" stroke-linecap="round" transform="rotate(-90 45 65)"/>
        <text x="45" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="14" fill="#FFFFFF" text-anchor="middle">68%</text>
        <text x="45" y="125" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="11" fill="#9CA3AF" text-anchor="middle">Usuarios</text>
      </g>

      <!-- Gauge 2: 82% Conversión -->
      <g transform="translate(110, 0)">
        <circle cx="45" cy="65" r="32" stroke="#1F2937" stroke-width="5" fill="none"/>
        <circle cx="45" cy="65" r="32" stroke="#7C3AED" stroke-width="5" fill="none" 
                stroke-dasharray="201" stroke-dashoffset="36" stroke-linecap="round" transform="rotate(-90 45 65)"/>
        <text x="45" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="14" fill="#FFFFFF" text-anchor="middle">82%</text>
        <text x="45" y="125" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="11" fill="#9CA3AF" text-anchor="middle">Conversión</text>
      </g>
    </g>

    <!-- INNER CARD 3: Flujo de Datos Mensual (Wave graph) -->
    <g transform="translate(20, 235)">
      <!-- Container -->
      <rect x="0" y="0" width="420" height="205" rx="16" fill="#080C14" stroke="#1F2937" stroke-width="1"/>
      
      <!-- Label -->
      <text x="20" y="30" class="chart-title">FLUJO DE DATOS MENSUAL</text>

      <!-- Grid Helper Lines -->
      <line x1="20" y1="70" x2="400" y2="70" stroke="#1F2937" stroke-width="0.75" stroke-dasharray="3 3"/>
      <line x1="20" y1="120" x2="400" y2="120" stroke="#1F2937" stroke-width="0.75" stroke-dasharray="3 3"/>
      <line x1="20" y1="170" x2="400" y2="170" stroke="#1F2937" stroke-width="0.75" stroke-dasharray="3 3"/>

      <!-- Glowing Chart Path (Wave) -->
      <path d="M 20,160 Q 60,110 100,140 T 180,85 T 260,130 T 340,75 T 400,90" stroke="url(#lineGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- Grid Dot Nodes -->
      <circle cx="100" cy="140" r="5" fill="#2563EB" stroke="#080C14" stroke-width="1.5"/>
      <circle cx="180" cy="85" r="5" fill="#7C3AED" stroke="#080C14" stroke-width="1.5"/>
      <circle cx="260" cy="130" r="5" fill="#06B6D4" stroke="#080C14" stroke-width="1.5"/>
      <circle cx="340" cy="75" r="5" fill="#00F2FE" stroke="#080C14" stroke-width="1.5"/>
    </g>
  </g>
</svg>
