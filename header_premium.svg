<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <!-- Google Fonts import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&amp;display=swap');
      
      .brand-name {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 20px;
        fill: #FFFFFF;
        letter-spacing: -0.5px;
      }
      
      .brand-sub {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600;
        font-size: 14px;
        fill: #9CA3AF;
        letter-spacing: 0.5px;
      }

      .nav-link {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600;
        font-size: 15px;
        fill: #9CA3AF;
        text-anchor: middle;
      }

      .btn-text {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 14px;
        fill: #FFFFFF;
        text-anchor: middle;
        letter-spacing: 0.5px;
      }

      .tagline {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 13px;
        fill: #06B6D4;
        letter-spacing: 1.8px;
      }

      .hero-title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 64px;
        fill: #FFFFFF;
        letter-spacing: -2px;
      }

      .hero-desc {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 400;
        font-size: 17px;
        fill: #9CA3AF;
      }

      .dash-label {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 12px;
        fill: #6B7280;
        letter-spacing: 0.5px;
      }

      .dash-val {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 24px;
        fill: #FFFFFF;
      }

      .dash-stat {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #06B6D4;
      }

      .dash-title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #E5E7EB;
      }

      .dash-pill-text {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 10px;
        fill: #00F2FE;
        text-anchor: middle;
        letter-spacing: 0.5px;
      }

      .chart-title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 10px;
        fill: #6B7280;
        letter-spacing: 1px;
      }

      /* Glowing filters */
      #blur {
        filter: blur(80px);
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="crecimientoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="40%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="1200" height="675" fill="#080B11"/>

  <!-- Ambient Glow Effects -->
  <circle cx="1050" cy="500" r="300" fill="#2563EB" opacity="0.12" filter="url(#blur)"/>
  <circle cx="150" cy="200" r="250" fill="#7C3AED" opacity="0.08" filter="url(#blur)"/>
  <circle cx="600" cy="337" r="180" fill="#06B6D4" opacity="0.05" filter="url(#blur)"/>

  <!-- Background Data Grid (Technological Network Concept) -->
  <g opacity="0.15">
    <!-- horizontal grid lines -->
    <line x1="50" y1="120" x2="1150" y2="120" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="50" y1="240" x2="1150" y2="240" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="50" y1="360" x2="1150" y2="360" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="50" y1="480" x2="1150" y2="480" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="50" y1="600" x2="1150" y2="600" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <!-- vertical grid lines -->
    <line x1="150" y1="80" x2="150" y2="640" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="450" y1="80" x2="450" y2="640" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="750" y1="80" x2="750" y2="640" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
    <line x1="1050" y1="80" x2="1050" y2="640" stroke="#374151" stroke-width="0.5" stroke-dasharray="5 5"/>
  </g>

  <!-- ==================== NAVBAR ==================== -->
  <g transform="translate(0, 0)">
    <!-- Monogram logo in navbar -->
    <g transform="translate(60, 28) scale(0.045)">
      <path d="M 133.20000000000002,10.058488970345056 C 47.70000000000002,9.858488970345011 26.200000000000003,10.158488970344965 23.10000000000001,11.158488970344965 C 20.900000000000006,11.858488970345011 17.5,14.258488970344875 15.600000000000009,16.35848897034501 C 13.700000000000003,18.45848897034492 11.700000000000003,21.95848897034492 11.100000000000009,24.058488970345056 C 10.5,26.45848897034492 10.100000000000009,58.258488970344985 10.0,109.95848897034492 C 10.0,181.858488970345 10.200000000000003,192.55848897034494 11.5,196.45848897034492 C 12.400000000000006,198.858488970345 14.300000000000011,202.55848897034494 15.700000000000003,204.65848897034496 C 17.200000000000003,206.75848897034498 20.200000000000003,209.45848897034492 22.400000000000006,210.55848897034494 C 26.5,212.65848897034496 26.700000000000003,212.65848897034496 143.5,212.75848897034498 C 249.3,212.858488970345 261.5,213.05848897034494 270.8,214.55848897034494 C 276.5,215.55848897034494 286.8,217.45848897034492 293.8,218.858488970345 C 300.8,220.25848897034498 308.70000000000005,221.858488970345 311.5,222.358488970345 C 314.20000000000005,222.95848897034492 321.90000000000003,225.858488970345 328.5,228.858488970345 C 335.20000000000005,231.858488970345 344.6,235.65848897034496 349.5,237.45848897034492 C 354.5,239.15848897034496 365.20000000000005,243.95848897034492 373.40000000000003,248.05848897034494 C 381.70000000000005,252.15848897034496 391.8,257.85848897034504 396.0,260.658488970345 C 400.1,263.45848897034494 408.20000000000005,269.45848897034494 414.0,274.158488970345 C 419.80000000000007,278.758488970345 429.20000000000005,287.35848897034504 434.80000000000007,293.258488970345 C 440.5,299.05848897034497 445.9,305.158488970345 446.70000000000005,306.85848897034504 C 447.6,308.45848897034494 450.0,311.758488970345 452.1,314.05848897034497 C 454.20000000000005,316.35848897034504 458.1,321.55848897034497 C 460.6,325.55848897034497 C 463.20000000000005,329.55848897034497 466.800000000000